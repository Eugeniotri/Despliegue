<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuestionario UF1 - Despliegue DAW</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #3b82f6;
      --danger: #ef4444;
      --warning: #f59e0b;
      --border: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill {
      background: #0b1220;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
    }

    .progress {
      height: 12px;
      width: 100%;
      background: #0b1220;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin: 10px 0 18px;
    }

    .bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      transition: width .25s ease;
    }

    .question {
      font-size: 1.2rem;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .option {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card-2);
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      user-select: none;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #60a5fa;
    }

    .option input {
      margin-top: 3px;
      transform: scale(1.15);
    }

    .option.correct {
      border-color: var(--accent);
      background: rgba(34, 197, 94, 0.12);
    }

    .option.incorrect {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.12);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: var(--accent-2);
      color: white;
    }

    .btn-secondary {
      background: #334155;
      color: white;
    }

    .btn-success {
      background: var(--accent);
      color: #052e16;
    }

    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #0b1220;
      line-height: 1.6;
      display: none;
    }

    .feedback.ok {
      border-color: var(--accent);
      background: rgba(34, 197, 94, 0.08);
    }

    .feedback.bad {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.08);
    }

    .muted {
      color: var(--muted);
    }

    .result-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .review-item {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #0b1220;
      line-height: 1.6;
    }

    .score {
      font-size: 1.15rem;
      margin: 8px 0 0;
    }

    .hidden { display: none; }

    @media (max-width: 600px) {
      h1 { font-size: 1.35rem; }
      .question { font-size: 1.05rem; }
      .card { padding: 16px; }
      button { width: 100%; }
      .controls { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Cuestionario UF1 — Despliegue DAW</h1>
      <div class="subtitle">
        Incluye las 40 preguntas del cuestionario que practicamos antes y las 15 que me has pasado después. Está pensado para abrirlo en Visual Studio Code, subirlo a GitHub Pages y usarlo cómodamente desde el móvil.
      </div>

      <div id="quizScreen">

      </div>
    </div>
  </div>

        options: ["Los firewalls.", "La virtualización.", "Los balanceadores de carga"],
        answer: 1,
        explanation: "Los contenedores se apoyan en la virtualización a nivel del sistema operativo."
      },
      {
        q: "¿Qué tipo de alojamiento web permite el máximo control sobre el servidor físico?",
        options: ["El alojamiento en la nube.", "El alojamiento dedicado.", "El alojamiento compartido."],
        answer: 1,
        explanation: "El alojamiento dedicado da control total del servidor físico a un solo cliente."
      }
    ];

    let current = 0;
    let score = 0;
    let selected = null;
    let checked = false;
    const userAnswers = Array(questions.length).fill(null);
    const answerStatus = Array(questions.length).fill(null);

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const counterEl = document.getElementById('counter');
    const scorePillEl = document.getElementById('scorePill');
    const barEl = document.getElementById('bar');
    const feedbackEl = document.getElementById('feedback');
    const checkBtn = document.getElementById('checkBtn');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');
    const finalScoreEl = document.getElementById('finalScore');
    const finalMsgEl = document.getElementById('finalMsg');
    const reviewEl = document.getElementById('review');
    const retryBtn = document.getElementById('retryBtn');

    function renderQuestion() {
      const item = questions[current];
      selected = userAnswers[current];
      checked = answerStatus[current] !== null;

      counterEl.textContent = `Pregunta ${current + 1} / ${questions.length}`;
      scorePillEl.textContent = `Aciertos: ${score}`;
      barEl.style.width = `${((current) / questions.length) * 100}%`;
      questionEl.textContent = item.q;
      optionsEl.innerHTML = '';

      item.options.forEach((opt, index) => {
        const label = document.createElement('label');
        label.className = 'option';
        if (checked) {
          if (index === item.answer) label.classList.add('correct');
          if (index === selected && index !== item.answer) label.classList.add('incorrect');
        }

        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'option';
        radio.checked = selected === index;
        radio.disabled = checked;
        radio.addEventListener('change', () => {
          selected = index;
          userAnswers[current] = index;
        });

        const span = document.createElement('span');
        span.innerHTML = `<strong>${String.fromCharCode(65 + index)}.</strong> ${opt}`;

        label.appendChild(radio);
        label.appendChild(span);
        optionsEl.appendChild(label);
      });

      if (checked) {
        showFeedback(answerStatus[current], item.explanation, item.options[item.answer]);
      } else {
        feedbackEl.style.display = 'none';
        feedbackEl.className = 'feedback';
        feedbackEl.innerHTML = '';
      }

      nextBtn.textContent = current === questions.length - 1 ? 'Ver resultado' : 'Siguiente';
    }

    function showFeedback(isCorrect, explanation, correctText) {
      feedbackEl.style.display = 'block';
      feedbackEl.className = `feedback ${isCorrect ? 'ok' : 'bad'}`;
      feedbackEl.innerHTML = `
        <strong>${isCorrect ? '✅ Correcto' : '❌ Incorrecto'}</strong><br>
        <strong>Respuesta correcta:</strong> ${correctText}<br>
        <strong>Explicación:</strong> ${explanation}
      `;
    }

    function checkAnswer() {
      if (checked) return;
      if (selected === null) {
        alert('Elige una respuesta antes de comprobar.');
        return;
      }

      checked = true;
      const isCorrect = selected === questions[current].answer;
      answerStatus[current] = isCorrect;
      if (isCorrect) score++;
      scorePillEl.textContent = `Aciertos: ${score}`;
      renderQuestion();
    }

    function nextQuestion() {
      if (!checked) {
        alert('Primero pulsa en "Comprobar" para corregir la pregunta.');
        return;
      }

      if (current < questions.length - 1) {
        current++;
        renderQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      quizScreen.classList.add('hidden');
      resultScreen.classList.remove('hidden');
      const percent = ((score / questions.length) * 100).toFixed(1);
      finalScoreEl.textContent = `Has acertado ${score} de ${questions.length} preguntas (${percent}%).`;

      let msg = 'Buen trabajo.';
      if (score === questions.length) msg = 'Perfecto. Has hecho un pleno.';
      else if (percent >= 85) msg = 'Muy bien. Vas muy fuerte para el examen.';
      else if (percent >= 70) msg = 'Buen nivel. Repasa los fallos y lo tendrás controlado.';
      else if (percent >= 50) msg = 'Vas avanzando, pero conviene repasar la teoría y repetir el test.';
      else msg = 'Necesitas repasar bastante la UF1 antes del examen.';
      finalMsgEl.textContent = msg;

      reviewEl.innerHTML = '';
      questions.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'review-item';
        const userAnswerText = userAnswers[i] === null ? 'Sin responder' : item.options[userAnswers[i]];
        const status = answerStatus[i] ? '✅' : '❌';
        div.innerHTML = `
          <strong>${status} Pregunta ${i + 1}</strong><br>
          ${item.q}<br>
          <span class="muted"><strong>Tu respuesta:</strong> ${userAnswerText}</span><br>
          <span><strong>Correcta:</strong> ${item.options[item.answer]}</span><br>
          <span class="muted"><strong>Explicación:</strong> ${item.explanation}</span>
        `;
        reviewEl.appendChild(div);
      });
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      selected = null;
      checked = false;
      for (let i = 0; i < questions.length; i++) {
        userAnswers[i] = null;
        answerStatus[i] = null;
      }
      quizScreen.classList.remove('hidden');
      resultScreen.classList.add('hidden');
      barEl.style.width = '0%';
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    checkBtn.addEventListener('click', checkAnswer);
    nextBtn.addEventListener('click', nextQuestion);
    restartBtn.addEventListener('click', restartQuiz);
    retryBtn.addEventListener('click', restartQuiz);

    renderQuestion();
  </script>
</body>
</html>
